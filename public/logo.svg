<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA801E" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A5D3A" />
      <stop offset="100%" stop-color="#0D3B22" />
    </linearGradient>
  </defs>

  <!-- Background Pattern (8-pointed star base) -->
  <g transform="translate(200, 180) scale(1.2)">
    <!-- Outer Gold Star -->
    <path d="M0,-100 L20,-40 L80,-80 L40,-20 L100,0 L40,20 L80,80 L20,40 L0,100 L-20,40 L-80,80 L-40,20 L-100,0 L-40,-20 L-80,-80 L-20,-40 Z" fill="url(#goldGrad)" />
    <!-- Inner Green Star -->
    <path d="M0,-90 L18,-36 L72,-72 L36,-18 L90,0 L36,18 L72,72 L18,36 L0,90 L-18,36 L-72,72 L-36,18 L-90,0 L-36,-18 L-72,-80 L-18,-36 Z" fill="url(#greenGrad)" />
    <!-- Inner White Circle -->
    <circle cx="0" cy="0" r="70" fill="#FFFFFF" />
    
    <!-- Crescent -->
    <path d="M-10,-50 A 55 55 0 1 0 50,40 A 45 45 0 1 1 -10,-50 Z" fill="url(#goldGrad)" />
    
    <!-- Mosque Dome -->
    <path d="M10,30 Q 30,-10 50,30 Z" fill="url(#greenGrad)" />
    <!-- Mosque Base -->
    <rect x="10" y="30" width="40" height="15" fill="url(#greenGrad)" />
    
    <!-- Minaret -->
    <rect x="-5" y="-10" width="8" height="55" fill="url(#greenGrad)" />
    <polygon points="-9,-10 7,-10 -1,-25" fill="url(#greenGrad)" />
    
    <!-- Star -->
    <polygon points="40,-30 45,-20 55,-20 47,-12 50,-2 40,-8 30,-2 33,-12 25,-20 35,-20" fill="url(#goldGrad)" />
  </g>

  <!-- Text -->
  <text x="200" y="340" font-family="sans-serif" font-size="32" font-weight="bold" fill="#1A5D3A" text-anchor="middle">নূর কম্প্যানিয়ন</text>
  <text x="200" y="370" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1A5D3A" text-anchor="middle" letter-spacing="2">NOOR COMPANION</text>
</svg>
